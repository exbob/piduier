<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostname 管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-read {
            background: #667eea;
            color: white;
        }
        
        .btn-read:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-save {
            background: #48bb78;
            color: white;
        }
        
        .btn-save:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
            display: block;
        }
        
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
            display: block;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hostname 管理</h1>
        <form id="hostnameForm">
            <div class="form-group">
                <label for="hostname">当前 Hostname:</label>
                <input type="text" id="hostname" name="hostname" placeholder="点击读取按钮获取当前 hostname">
            </div>
            <div class="button-group">
                <button type="button" id="readBtn" class="btn-read">读取</button>
                <button type="button" id="saveBtn" class="btn-save">保存</button>
            </div>
            <div id="message" class="message"></div>
        </form>
    </div>

    <script>
        const hostnameInput = document.getElementById('hostname');
        const readBtn = document.getElementById('readBtn');
        const saveBtn = document.getElementById('saveBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, isError = false) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + (isError ? 'error' : 'success');
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 5000);
        }

        function setLoading(button, isLoading) {
            if (isLoading) {
                button.disabled = true;
                button.innerHTML = '<span class="loading"></span>处理中...';
            } else {
                button.disabled = false;
                if (button.id === 'readBtn') {
                    button.textContent = '读取';
                } else {
                    button.textContent = '保存';
                }
            }
        }

        // Read hostname
        readBtn.addEventListener('click', async () => {
            setLoading(readBtn, true);
            try {
                const response = await fetch('/api/hostname');
                const data = await response.json();
                
                if (response.ok && data.hostname) {
                    hostnameInput.value = data.hostname;
                    showMessage('Hostname 读取成功');
                } else {
                    showMessage(data.error || '读取 hostname 失败', true);
                }
            } catch (error) {
                showMessage('网络错误: ' + error.message, true);
            } finally {
                setLoading(readBtn, false);
            }
        });

        // Save hostname
        saveBtn.addEventListener('click', async () => {
            const hostname = hostnameInput.value.trim();
            
            if (!hostname) {
                showMessage('请输入 hostname', true);
                return;
            }

            setLoading(saveBtn, true);
            try {
                const response = await fetch('/api/hostname', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ hostname: hostname })
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    showMessage('Hostname 设置成功');
                } else {
                    showMessage(data.message || '设置 hostname 失败', true);
                }
            } catch (error) {
                showMessage('网络错误: ' + error.message, true);
            } finally {
                setLoading(saveBtn, false);
            }
        });

        // Allow Enter key to save
        hostnameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                saveBtn.click();
            }
        });
    </script>
</body>
</html>
