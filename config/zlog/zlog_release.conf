[global]
strict init = true
default format = "%d(%F %T.%l) %-6V %m%n"

[formats]
ts = "%d(%F %T.%l) %-6V %m%n"

[rules]
# Log path: set by process env PIDUIER_LOG_FILE (default ./piduier.log in main), or -l/--log-file
piduier.=ERROR "%E(PIDUIER_LOG_FILE)", 10MB * 5 ~ ; ts
piduier.=INFO "%E(PIDUIER_LOG_FILE)", 10MB * 5 ~ ; ts
mongoose.=ERROR "%E(PIDUIER_LOG_FILE)", 10MB * 5 ~ ; ts
mongoose.=INFO "%E(PIDUIER_LOG_FILE)", 10MB * 5 ~ ; ts
